services:
  - type: web
    name: wo-integration
    runtime: python
    plan: free
    region: oregon
    buildCommand: uv sync --frozen && uv cache prune --ci
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
